<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scroll Sticky Demo</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="app">
    <div class="content">
      <div class="spacer">Scroll down 👇</div>

      <!-- Trigger point -->
      <div id="trigger"></div>

      <!-- Element that becomes fixed -->
      <div id="sticky" class="box">
        I become fixed when you scroll past me
      </div>

      <div class="spacer big">Keep scrolling</div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
